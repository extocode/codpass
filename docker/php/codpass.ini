; codPass dev container PHP settings.
; display_errors Off mirrors production so the app renders cleanly; errors go
; to the log. E_DEPRECATED is filtered because bundled klein/klein is not yet
; PHP 8.4-clean (deprecation notices only) — see CONTRIBUTING / tech debt.
display_errors = Off
log_errors = On
error_reporting = E_ALL & ~E_DEPRECATED & ~E_NOTICE
memory_limit = 256M
date.timezone = UTC
