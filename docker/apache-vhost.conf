<VirtualHost *:80>
    DocumentRoot /var/www/html

    <Directory /var/www/html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
        DirectoryIndex index.php

        # Serve existing files (assets under public/) directly; route the rest
        # through the front controller. Mirrors the repo's router.php behaviour.
        FallbackResource /index.php
    </Directory>

    # Application internals are served through PHP (the front controllers),
    # never directly. Deny web access to source, config (DB creds + crypto
    # keys), schemas, tests, composer's vendor tree and docker assets.
    <DirectoryMatch "^/var/www/html/(app|lib|schemas|tests|vendor|resources|docker)/">
        Require all denied
    </DirectoryMatch>

    # Exception: bundled theme CSS/JS (and the fonts the CSS references by
    # on-disk path, e.g. css/Roboto_400.woff2) live under the themes tree.
    # Allow only static asset file types there; PHP views (.inc/.php) stay denied.
    <DirectoryMatch "^/var/www/html/app/modules/web/themes/[^/]+/(css|js)/">
        <FilesMatch "\.(css|js|map|woff2?|ttf|eot|otf|svg|png|jpe?g|gif|ico)$">
            Require all granted
        </FilesMatch>
    </DirectoryMatch>

    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>
